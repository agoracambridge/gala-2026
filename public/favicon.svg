<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="envGold" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5D47E"/>
      <stop offset="30%" stop-color="#D4A843"/>
      <stop offset="60%" stop-color="#C8952E"/>
      <stop offset="100%" stop-color="#A87B24"/>
    </linearGradient>
    <linearGradient id="envBody" x1="0" y1="12" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8C45A"/>
      <stop offset="100%" stop-color="#B8912A"/>
    </linearGradient>
    <linearGradient id="flapGrad" x1="24" y1="8" x2="24" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5D47E"/>
      <stop offset="100%" stop-color="#C8952E"/>
    </linearGradient>
    <radialGradient id="sealGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#E84040"/>
      <stop offset="60%" stop-color="#C02020"/>
      <stop offset="100%" stop-color="#8B1515"/>
    </radialGradient>
    <filter id="sealShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="envEdge" x1="0" y1="12" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#9A7020"/>
    </linearGradient>
  </defs>

  <!-- Envelope body -->
  <rect x="3" y="12" width="42" height="28" rx="3" fill="url(#envBody)" stroke="url(#envEdge)" stroke-width="0.8"/>

  <!-- Inner shadow line at bottom -->
  <line x1="5" y1="38" x2="43" y2="38" stroke="#9A7020" stroke-width="0.5" opacity="0.4"/>

  <!-- Bottom flap triangles (behind seal) -->
  <path d="M3 38 L24 25 L45 38 Z" fill="#C8952E" opacity="0.5"/>

  <!-- Envelope flap (top triangle) -->
  <path d="M3.5 12.5 L24 28 L44.5 12.5 Z" fill="url(#flapGrad)" stroke="#B8912A" stroke-width="0.5"/>

  <!-- Flap fold highlight -->
  <path d="M6 13 L24 26.5 L42 13" fill="none" stroke="#F5D47E" stroke-width="0.4" opacity="0.6"/>

  <!-- Wax seal -->
  <g filter="url(#sealShadow)">
    <!-- Seal base circle -->
    <circle cx="24" cy="27" r="8.5" fill="url(#sealGrad)"/>
    <!-- Wax drip details -->
    <ellipse cx="18" cy="23" rx="2.5" ry="1.8" fill="#C02020" opacity="0.7" transform="rotate(-15 18 23)"/>
    <ellipse cx="30.5" cy="24" rx="2" ry="1.5" fill="#C02020" opacity="0.6" transform="rotate(10 30.5 24)"/>
    <ellipse cx="21" cy="33" rx="2.2" ry="1.5" fill="#8B1515" opacity="0.5" transform="rotate(5 21 33)"/>
    <ellipse cx="28" cy="33.5" rx="1.8" ry="1.3" fill="#8B1515" opacity="0.5" transform="rotate(-8 28 33.5)"/>
    <!-- Seal inner ring -->
    <circle cx="24" cy="27" r="6" fill="none" stroke="#E84040" stroke-width="0.8" opacity="0.5"/>
    <!-- Seal inner highlight -->
    <circle cx="24" cy="27" r="4.5" fill="none" stroke="#F0A0A0" stroke-width="0.3" opacity="0.4"/>
    <!-- Seal shine -->
    <ellipse cx="21.5" cy="24.5" rx="3" ry="2" fill="#F08080" opacity="0.25" transform="rotate(-20 21.5 24.5)"/>
    <!-- Embossed "A" for Agora -->
    <text x="24" y="30" text-anchor="middle" font-family="serif" font-size="9" font-weight="bold" fill="#8B1515" opacity="0.6">A</text>
    <text x="24" y="30" text-anchor="middle" font-family="serif" font-size="9" font-weight="bold" fill="#F5C0C0" opacity="0.3">A</text>
  </g>
</svg>
